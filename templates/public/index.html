<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmVet Connect - Remote Livestock Health Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body {
            background: linear-gradient(135deg, #2d6a4f 0%, #52b788 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .hero {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .hero-icon { font-size: 80px; margin-bottom: 20px; }
        .hero h1 { font-size: 40px; color: #1b4332; font-weight: 900; margin-bottom: 10px; }
        .hero p { font-size: 18px; color: #52b788; font-weight: 500; margin-bottom: 40px; }
        .portal-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .portal-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #2d6a4f, #52b788);
            color: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            min-width: 200px;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(45,106,79,0.4);
        }
        .portal-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(45,106,79,0.5);
        }
        .portal-card i { font-size: 40px; }
        .portal-card small { font-size: 13px; font-weight: 400; opacity: 0.85; }
        footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-icon">🐄</div>
        <h1>FarmVet Connect</h1>
        <p>Remote Livestock Health Management & Veterinary Consultation</p>

        <div class="portal-cards">
            <a href="/login/admin" class="portal-card">
                <i class="fas fa-user-shield"></i>
                Administrator
                <small>System management</small>
            </a>
            <a href="/login/manager" class="portal-card">
                <i class="fas fa-tractor"></i>
                Farm Manager
                <small>Report sick animals</small>
            </a>
            <a href="/login/vet" class="portal-card">
                <i class="fas fa-stethoscope"></i>
                Veterinarian
                <small>Review cases</small>
            </a>
        </div>
    </div>

    <footer>© 2026 FarmVet Connect — Bringing veterinary care to every farm</footer>
</body>
</html>
